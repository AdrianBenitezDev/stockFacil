<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StockFacil - Registro Empleador</title>
  <meta name="description" content="Registro de empleadores en StockFacil para activar gestion de stock, ventas y caja.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://www.stockfacil.com.ar/registro.html">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-banner">
    <div class="top-banner-inner">
      <strong class="top-banner-title top-banner-brand">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 17l9 4 9-4"/><path d="M3 12l9 4 9-4"/></svg>
        </span>
        <span>stockfacil.com.ar</span>
      </strong>
      <span class="top-banner-subtitle">Registro de empleador</span>
    </div>
  </header>

  <main class="container">
    <section class="video-guide">
      <details class="video-guide-toggle">
        <summary>Ver video</summary>
        <video class="video-guide-player" controls preload="metadata">
          <source src="videos/video 1 registro.mp4" type="video/mp4">
          Tu navegador no soporta video HTML5.
        </video>
      </details>
    </section>

    <section>
      <h1>Registrar Negocio</h1>
      <p class="subtitle">Completa tus datos y los de tu Negocio.</p>

      <div id="register-subscription-box" class="subscription-box hidden" aria-live="polite">
        <div class="subscription-box-head">
          <strong id="register-subscription-status" class="subscription-status is-pending">Suscripcion pendiente</strong>
          <p id="register-subscription-message" class="subscription-hint">Estamos esperando confirmacion de Mercado Pago.</p>
        </div>
        <div class="subscription-actions">
          <button id="register-subscription-btn" type="button" class="hidden">Ir a suscribirme con Mercado Pago</button>
          <button id="register-subscription-retry-btn" type="button" class="mode-btn-secondary hidden">Actualizar estado</button>
          <button id="register-subscription-cancel-btn" type="button" class="mode-btn-secondary hidden">Cancelar intento</button>
        </div>
      </div>

      <form id="register-form" autocomplete="off">
        <h3>Datos personales</h3>

        <label for="register-fullname">Nombre y apellido</label>
        <input id="register-fullname" name="nombreApellido" type="text" required>
        <small id="err-nombreApellido" class="feedback"></small>

        <label for="register-email">Email</label>
        <input id="register-email" name="email" type="email" required>
        <small id="err-email" class="feedback"></small>

        <label for="register-phone">Telefono</label>
        <input id="register-phone" name="telefono" type="text" inputmode="numeric" required>
        <small id="err-telefono" class="feedback"></small>

        <h3>Datos del negocio</h3>

        <label for="register-kiosk-name">Nombre del Negocio</label>
        <input id="register-kiosk-name" name="nombreKiosco" type="text" required>
        <small id="err-nombreKiosco" class="feedback"></small>

        <label for="register-business-type">Tipo de negocio</label>
        <select id="register-business-type" name="businessTypeId" required>
          <option value="">Selecciona un tipo de negocio</option>
        </select>
        <small id="err-businessTypeId" class="feedback"></small>

        <div id="register-business-custom-wrap" class="hidden">
          <label for="register-business-custom-label">Otra categoria</label>
          <input
            id="register-business-custom-label"
            name="businessTypeCustomLabel"
            type="text"
            maxlength="30"
            placeholder="Ej: Ferreteria"
          >
          <small id="err-businessTypeCustomLabel" class="feedback"></small>
        </div>

        <label for="register-country-input">Pais</label>
        <div class="country-autocomplete">
          <input id="register-country-input" name="pais" type="text" autocomplete="off" required>
          <div id="register-country-suggestions" class="country-suggestions hidden" role="listbox"></div>
        </div>
        <small id="err-pais" class="feedback"></small>

        <label for="register-province">Provincia/Estado</label>
        <select id="register-province" name="provinciaEstado" required></select>
        <small id="err-provinciaEstado" class="feedback"></small>

        <label for="register-district">Distrito</label>
        <input id="register-district" name="distrito" type="text" required>
        <small id="err-distrito" class="feedback"></small>

        <label for="register-city">Localidad</label>
        <input id="register-city" name="localidad" type="text" required>
        <small id="err-localidad" class="feedback"></small>

        <label for="register-address">Domicilio del negocio</label>
        <input id="register-address" name="domicilio" type="text" required>
        <small id="err-domicilio" class="feedback"></small>

        <h3>Plan</h3>
        <div id="register-plan-cards" class="plan-cards" aria-live="polite"></div>
        <input id="register-plan-selected" name="plan" type="hidden" value="prueba">
        <small id="register-plans-feedback" class="feedback"></small>
        <div>
          <small>Selecciona un plan para continuar.</small>
        </div>
        <small id="err-plan" class="feedback"></small>

        <button id="register-submit-btn" type="submit">Crear negocio</button>
        <button id="back-login-btn" type="button" class="mode-btn-secondary">Volver al login</button>
      </form>

      <p id="register-feedback" class="feedback" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="js/registro.js"></script>

  <script type="module" src="js/pwa.js"></script>
</body>
</html>
